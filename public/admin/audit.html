<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAZAFI Admin — Audit</title>
  <link rel="stylesheet" href="/admin/admin.css?v=admin-wide-1" />
</head>
<body class="rz-admin-shell">
  <div class="login-container">
    <div class="card rz-dashboard-shell rz-audit-shell" style="max-width: 1200px; width: 96%;">
      <div class="topbar rz-audit-topbar">
        <div class="title">
          <h1 class="rz-hero-title">Audit</h1>
          <div id="me" class="rz-owner-chip"><span class="rz-owner-text"><span class="rz-owner-label">Vérification de la session…</span></span></div>
        </div>
        <div class="nav" style="display:none;"></div>
      </div>

      <!-- Filters -->
      <div class="sticky-bar rz-audit-tools">
        <div class="filters">
          <input id="q" class="filter-search" maxlength="80" placeholder="Rechercher : ref / MAC / téléphone..." />

          <select id="status" class="filter-select">
            <option value="">Tous les statuts</option>
            <option value="success">Succès</option>
            <option value="info">Info</option>
            <option value="pending">En attente</option>
            <option value="warning">Avertissement</option>
            <option value="blocked">Bloqué</option>
            <option value="failed">Échec</option>
            <option value="ok">OK</option>
            <option value="error">Erreur</option>
          </select>

          <select id="event_type" class="filter-select">
            <option value="">Tous les événements</option>
          </select>

          <select id="plan_id" class="filter-select">
            <option value="">Tous les plans</option>
          </select>

          <select id="pool_id" class="filter-select">
            <option value="">Tous les pools</option>
          </select>

          <input id="from" type="datetime-local" class="filter-search" title="Heure de Madagascar (Indian/Antananarivo, UTC+03:00)" />
          <input id="to" type="datetime-local" class="filter-search" title="Heure de Madagascar (Indian/Antananarivo, UTC+03:00)" />
          <!-- P1-07 : les dates/heures sont interprétées en heure de Madagascar (+03:00 fixe), quel que soit le fuseau de l'appareil. -->
          <span class="rz-audit-status-line" style="align-self:center; opacity:.8;">🕒 Heure de Madagascar (UTC+03:00)</span>

          <button type="button" id="apply" class="filter-btn primary">Appliquer</button>
          <button type="button" id="clear" class="filter-btn">Effacer</button>
        </div>
      </div>

      <div id="statusLine" class="rz-audit-status-line"></div>

      <div class="table-wrap rz-audit-table-wrap">
        <table class="rz-audit-table" style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="text-align:left; border-bottom:1px solid rgba(0,0,0,0.08);">
              <th style="padding:10px;">Date</th>
              <th style="padding:10px;">Statut</th>
              <th style="padding:10px;">Événement</th>
              <th style="padding:10px;">MVola</th>
              <th style="padding:10px;">Paiement</th>
              <th style="padding:10px;">Référence</th>
              <th style="padding:10px;">Client MAC</th>
              <th style="padding:10px;">Plan</th>
              <th style="padding:10px;">Débit</th>
              <th style="padding:10px;">Pool</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="rz-audit-pager">
        <button id="prev" type="button">Précédent</button>
        <button id="next" type="button">Suivant</button>
      </div>

      <!-- Details modal -->
      <div id="modal" class="modal" style="display:none;">
        <div class="card modal-card audit-modal-card rz-audit-modal-card">
          <div class="rz-audit-modal-head">
            <div class="rz-audit-modal-title">Détail audit</div>
            <button id="closeModal" type="button">Fermer</button>
          </div>

          <div class="audit-modal-summary rz-audit-modal-summary">
            <div class="audit-kv">
              <div class="k">Événement</div><div class="v" id="m_event">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Statut</div><div class="v"><span id="m_status_badge" class="badge audit-badge">—</span></div>
            </div>
            <div class="audit-kv">
              <div class="k">Date</div><div class="v" id="m_date">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Référence</div><div class="v" id="m_request_ref">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">MVola</div><div class="v" id="m_mvola_phone">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Mode paiement</div><div class="v" id="m_payment">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Client MAC</div><div class="v" id="m_client_mac">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">AP MAC</div><div class="v" id="m_ap_mac">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Plan</div><div class="v" id="m_plan_id">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Limite débit</div><div class="v" id="m_speed">—</div>
            </div>
            <div class="audit-kv">
              <div class="k">Pool</div><div class="v" id="m_pool_id">—</div>
            </div>
            <div class="audit-kv audit-kv-wide">
              <div class="k">Message</div><div class="v" id="m_message">—</div>
            </div>
          </div>

          <div class="rz-audit-meta-head">
            <div class="rz-audit-meta-title">Métadonnées</div>
            <button id="copyMeta" type="button" class="audit-copy-btn">Copier metadata</button>
            <button id="copyEvent" type="button" class="audit-copy-btn">Copier événement</button>
          </div>

          <pre id="m_metadata" class="audit-meta-pre"></pre>
        </div>
      </div>

    </div>
  </div>

  <script src="/admin/nav.js?v=admin-wide-1"></script>
  <script src="/admin/audit.js?v=p2-b2-1"></script>
</body>
</html>
