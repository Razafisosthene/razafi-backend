<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAZAFI Admin — Audit</title>
  <link rel="stylesheet" href="/admin/admin.css" />

  <!-- Audit page local polish only: no global admin.css change -->
  <style>
    .rz-audit-shell{display:flex;flex-direction:column;gap:14px;}
    .rz-audit-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;}
    .rz-audit-title-block{min-width:0;}
    .rz-audit-me{white-space:normal;line-height:1.25;}
    .rz-audit-me strong{display:block;color:var(--rz-text,#111827);font-weight:900;margin-top:2px;word-break:break-word;}
    .rz-audit-filter-grid{
      display:grid;
      grid-template-columns:minmax(260px,1.45fr) minmax(150px,.75fr) minmax(170px,.9fr) minmax(160px,.85fr) minmax(160px,.85fr);
      gap:10px;
      align-items:center;
    }
    .rz-audit-filter-grid input,.rz-audit-filter-grid select{margin-bottom:0;min-width:0;width:100%;}
    .rz-audit-filter-grid button{width:100%;}
    .rz-audit-date-row{display:grid;grid-template-columns:minmax(190px,1fr) minmax(190px,1fr) auto auto;gap:10px;align-items:center;grid-column:1/-1;}
    .rz-audit-date-row input{margin-bottom:0;}
    .rz-audit-date-row button{min-height:52px;}
    .rz-audit-status-line{margin-top:14px;color:var(--rz-muted,#6b7280);font-weight:800;font-size:13px;}
    .rz-audit-table-card{margin-top:14px;border-radius:24px;background:rgba(255,255,255,.76);border:1px solid rgba(255,255,255,.88);box-shadow:0 12px 28px rgba(15,23,42,.08);overflow:hidden;}
    .rz-audit-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;}
    .rz-audit-table{width:100%;border-collapse:separate;border-spacing:0;min-width:1120px;}
    .rz-audit-table th{position:sticky;top:0;z-index:2;text-align:left;padding:12px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--rz-muted,#6b7280);background:rgba(248,250,252,.96);border-bottom:1px solid rgba(17,24,39,.08);}
    .rz-audit-table td{padding:12px 10px;border-bottom:1px solid rgba(17,24,39,.07);vertical-align:middle;font-size:14px;}
    .rz-audit-table tbody tr:hover{background:rgba(13,110,253,.04);}
    .rz-audit-empty{padding:16px;color:var(--rz-muted,#6b7280);font-weight:800;}
    .rz-audit-pager{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
    .rz-audit-pager button{width:auto;}
    .rz-audit-modal-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px;}
    .rz-audit-modal-title{font-weight:950;font-size:20px;letter-spacing:-.03em;color:var(--rz-text,#111827);}
    .rz-audit-copy-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;}
    .rz-audit-copy-title{font-weight:900;color:var(--rz-text,#111827);}
    @media (max-width:1100px){.rz-audit-filter-grid{grid-template-columns:1fr 1fr;}.rz-audit-filter-grid .filter-search:first-child{grid-column:1/-1;}.rz-audit-date-row{grid-template-columns:1fr 1fr;}.rz-audit-date-row button{width:100%;}}
    @media (max-width:640px){.rz-audit-filter-grid{grid-template-columns:1fr;}.rz-audit-date-row{grid-template-columns:1fr;}.rz-audit-table-card{border-radius:20px;}.rz-audit-table th,.rz-audit-table td{padding:10px 9px;}.rz-audit-pager button{flex:1 1 0;}}


    /* Audit V3 mobile fixes: visible status selector + centered modal */
    .audit-page #status{
      display:block !important;
      color:var(--rz-text,#111827) !important;
      background-color:rgba(255,255,255,.92) !important;
      min-height:52px;
      line-height:1.2;
      overflow:visible;
      appearance:auto;
      -webkit-appearance:menulist;
    }
    .audit-page #status option{color:#111827;background:#fff;}
    .audit-page .modal{
      position:fixed !important;
      inset:0 !important;
      z-index:10000 !important;
      display:none;
      align-items:center !important;
      justify-content:center !important;
      padding:18px !important;
      overflow:auto !important;
      background:rgba(15,23,42,.52) !important;
    }
    .audit-page .modal[style*="display: flex"],
    .audit-page .modal.is-open{display:flex !important;}
    .audit-page .audit-modal-card{
      margin:0 auto !important;
      width:min(900px, calc(100vw - 28px)) !important;
      max-height:calc(100vh - 80px) !important;
      overflow:auto !important;
      border-radius:24px !important;
    }
    @media (max-width:640px){
      .audit-page .sticky-bar{padding:14px;}
      .audit-page .rz-audit-filter-grid{gap:10px;}
      .audit-page .rz-audit-filter-grid input,
      .audit-page .rz-audit-filter-grid select,
      .audit-page .rz-audit-date-row input,
      .audit-page .rz-audit-date-row button{
        width:100% !important;
        max-width:none !important;
        min-height:56px;
      }
      .audit-page .audit-modal-card{
        width:calc(100vw - 28px) !important;
        max-height:calc(100vh - 110px) !important;
        border-radius:22px !important;
      }
      .audit-page .rz-audit-modal-head{align-items:flex-start;}
      .audit-page .audit-modal-summary{grid-template-columns:1fr !important;}
      .audit-page .rz-audit-copy-row button{width:100% !important;}
    }

  </style>
</head>
<body class="rz-admin-shell audit-page">
  <div class="login-container">
    <div class="card rz-audit-shell" style="max-width: 1180px; width: 96%;">
      <div class="topbar rz-audit-header">
        <div class="title rz-audit-title-block">
          <h1 class="rz-hero-title">Audit</h1>
          <div id="me" class="subtitle rz-audit-me">Vérification de la session…</div>
        </div>
        <div class="nav" style="display:none;"></div>
      </div>

      <div class="sticky-bar">
        <div class="filters rz-audit-filter-grid">
          <input id="q" class="filter-search" placeholder="Rechercher : référence, MAC, téléphone…" />

          <select id="status" class="filter-select" aria-label="Filtrer par statut">
            <option value="" selected>Statut : tous</option>
            <option value="success">succès</option>
            <option value="info">info</option>
            <option value="pending">en attente</option>
            <option value="warning">avertissement</option>
            <option value="blocked">bloqué</option>
            <option value="failed">échec</option>
            <option value="ok">ok</option>
            <option value="error">erreur</option>
          </select>

          <select id="event_type" class="filter-select" aria-label="Filtrer par événement">
            <option value="">Événement : tous</option>
          </select>

          <select id="plan_id" class="filter-select" aria-label="Filtrer par plan">
            <option value="">Plan : tous</option>
          </select>

          <select id="pool_id" class="filter-select" aria-label="Filtrer par pool">
            <option value="">Pool : tous</option>
          </select>

          <div class="rz-audit-date-row">
            <input id="from" type="datetime-local" class="filter-search" aria-label="Date début" />
            <input id="to" type="datetime-local" class="filter-search" aria-label="Date fin" />
            <button type="button" id="apply" class="filter-btn primary">Appliquer</button>
            <button type="button" id="clear" class="filter-btn">Effacer</button>
          </div>
        </div>
      </div>

      <div id="statusLine" class="rz-audit-status-line"></div>

      <div class="rz-audit-table-card">
        <div class="rz-audit-table-wrap">
          <table class="rz-audit-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Statut</th>
                <th>Événement</th>
                <th>MVola</th>
                <th>Référence</th>
                <th>MAC client</th>
                <th>Plan</th>
                <th>Pool</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="8" class="rz-audit-empty">Chargement…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="rz-audit-pager">
        <button id="prev" type="button" class="filter-btn">Précédent</button>
        <button id="next" type="button" class="filter-btn primary">Suivant</button>
      </div>

      <div id="modal" class="modal" style="display:none;">
        <div class="card modal-card audit-modal-card">
          <div class="rz-audit-modal-head">
            <div class="rz-audit-modal-title">Détail audit</div>
            <button id="closeModal" type="button" class="filter-btn" style="width:auto;">Fermer</button>
          </div>

          <div class="audit-modal-summary">
            <div class="audit-kv"><div class="k">Événement</div><div class="v" id="m_event">—</div></div>
            <div class="audit-kv"><div class="k">Statut</div><div class="v"><span id="m_status_badge" class="badge audit-badge">—</span></div></div>
            <div class="audit-kv"><div class="k">Date</div><div class="v" id="m_date">—</div></div>
            <div class="audit-kv"><div class="k">Référence</div><div class="v" id="m_request_ref">—</div></div>
            <div class="audit-kv"><div class="k">MVola</div><div class="v" id="m_mvola_phone">—</div></div>
            <div class="audit-kv"><div class="k">MAC client</div><div class="v" id="m_client_mac">—</div></div>
            <div class="audit-kv"><div class="k">MAC AP</div><div class="v" id="m_ap_mac">—</div></div>
            <div class="audit-kv"><div class="k">Plan</div><div class="v" id="m_plan_id">—</div></div>
            <div class="audit-kv"><div class="k">Pool</div><div class="v" id="m_pool_id">—</div></div>
            <div class="audit-kv audit-kv-wide"><div class="k">Message</div><div class="v" id="m_message">—</div></div>
          </div>

          <div class="rz-audit-copy-row">
            <div class="rz-audit-copy-title">Métadonnées</div>
            <button id="copyMeta" type="button" class="filter-btn audit-copy-btn" style="width:auto;">Copier métadonnées</button>
            <button id="copyEvent" type="button" class="filter-btn audit-copy-btn" style="width:auto;">Copier événement</button>
          </div>

          <pre id="m_metadata" class="audit-meta-pre"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/admin/nav.js"></script>
  <script src="/admin/audit.js"></script>
</body>
</html>
