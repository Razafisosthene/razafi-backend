<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAZAFI Admin — Clients</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="rz-admin-shell">
  <div class="login-container">
    <div class="card rz-dashboard-shell rz-clients-shell" style="max-width: 1200px; width: 96%;">
      <div class="topbar rz-clients-topbar">
        <div class="title">
          <h1 class="rz-hero-title">Clients</h1>
          <div id="me" class="rz-owner-chip"><span class="rz-owner-text"><span class="rz-owner-label">Vérification de la session…</span></span></div>
        </div>

        <!-- legacy nav kept hidden to avoid breaking clients.js -->
        <div class="nav" style="display:none;">
          <a href="/admin/"><button type="button">Dashboard</button></a>
          <a href="/admin/aps.html"><button type="button">APs</button></a>
          <a href="/admin/plans.html"><button type="button">Plans</button></a>
          <a href="/admin/pools.html"><button type="button">Pools</button></a>
          <a href="/admin/revenue.html"><button type="button">Revenue</button></a>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>

      <div class="sticky-bar rz-clients-tools">
        <div class="filters">
          <input id="search" class="filter-search" placeholder="Rechercher : MAC / code / MVola..." />
          <select id="status" class="filter-select">
            <option value="all">Tous</option>
            <option value="active">Actifs</option>
            <option value="online">Connectés 🟢</option>
            <option value="offline">Hors ligne ⚫</option>
            <option value="pending">En attente</option>
            <option value="expired">Expirés</option>
            <option value="used">Utilisés</option>
          </select>
          <select id="planFilter" class="filter-select" title="Filter by plan">
            <option value="all">Tous les plans</option>
          </select>
          <select id="poolFilter" class="filter-select" title="Filter by pool">
            <option value="all">Tous les pools</option>
          </select>
          <button id="refreshBtn" class="filter-btn" type="button">Actualiser</button>
          <button id="clearBtn" class="filter-btn" type="button">Effacer</button>
        </div>
      </div>

      <div id="summary" class="rz-clients-summary"></div>

      <div class="table-wrap">
        <table id="table" style="width:100%; border-collapse: collapse; min-width: 980px;">
          <thead>
            <tr style="text-align:left;">
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Client</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Statut</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">MVola</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Code</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Plan</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Prix</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">AP</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Pool</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Temps restant</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Data restante</th>
              <th style="padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Expiration</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="empty" class="subtitle" style="margin-top:14px; display:none;">
        Aucun enregistrement trouvé.
      </div>

      <div id="error" class="error" style="display:none;"></div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="modal" class="modal" style="display:none;">
    <div class="card modal-card rz-clients-modal-card">
      <div class="rz-client-modal-head">
        <div>
          <h1 class="rz-client-modal-title">Détails client</h1>
          <div id="modalSub" class="subtitle" style="margin:6px 0 0;">Chargement...</div>
        </div>
        <button id="closeModalBtn" type="button" class="rz-client-close-btn">Fermer</button>
      </div>

      <hr class="rz-client-modal-separator" />

      <div id="detail" class="rz-client-detail-grid"></div>

      <div class="modal-actions">
        <button id="deleteBtn" class="danger" type="button">Supprimer</button>
        <button id="closeModalBtn2" type="button">Fermer</button>
      </div>

      <div id="modalErr" class="error" style="display:none;"></div>
    </div>
  </div>

  <!-- NEW shared drawer -->
  <script src="/admin/nav.js"></script>
  <script src="./clients.js"></script>
</body>
</html>
