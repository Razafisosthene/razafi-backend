<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAZAFI Admin — Tableau de bord</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="login-container">
    <div class="card rz-dashboard-shell" style="max-width: 1100px; width: 96%;">

      <!-- TOP BAR -->
      <div class="topbar">
        <div class="title">
          <h1 class="rz-hero-title">Tableau de bord</h1>
          <div id="me" class="rz-owner-chip">Vérification de la session...</div>
        </div>

        <!-- legacy nav kept hidden to avoid breaking old JS assumptions -->
        <div class="nav" style="display:none;">
          <a href="/admin/"><button type="button">Dashboard</button></a>
          <a href="/admin/clients.html"><button type="button">Clients</button></a>
          <a href="/admin/aps.html"><button type="button">APs</button></a>
          <a href="/admin/plans.html"><button type="button">Plans</button></a>
          <a href="/admin/pools.html"><button type="button">Pools</button></a>
          <a href="/admin/revenue.html"><button type="button">Revenue</button></a>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>

      <!-- READ-ONLY POOLS OVERVIEW (MikroTik / RADIUS truth) -->
      <div class="sticky-bar rz-dashboard-tools rz-dashboard-tools-compact">
        <div class="filters">
          <select id="poolFilter" class="filter-search" style="max-width:240px;">
            <option value="">Tous les pools</option>
          </select>
          <button type="button" id="refresh" class="filter-btn primary" style="width:auto;">Actualiser</button>
        </div>
      </div>

      <div id="poolsContainer" class="rz-pools-grid"></div>
      <div id="status" class="rz-dashboard-status"></div>
    </div>
  </div>

  <!-- NEW shared drawer -->
  <script src="/admin/nav.js"></script>

  <script>
    async function fetchJSON(url, opts = {}) {
      const res = await fetch(url, { credentials: "include", ...opts });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error("Réponse serveur non JSON"); }
      if (!res.ok) throw new Error(data?.error || data?.message || "Requête échouée");
      return data;
    }

    // ---------------------------------------------------------------------------
    // READ-ONLY POOLS DASHBOARD
    // Source of truth for pool totals:
    //   /api/admin/pool-live-stats  (MikroTik / RADIUS)
    // ---------------------------------------------------------------------------

    const $ = (id) => document.getElementById(id);
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    function pct(n, d) {
      const num = Number(n), den = Number(d);
      if (!Number.isFinite(num) || !Number.isFinite(den) || den <= 0) return null;
      return Math.min(999, Math.round((num / den) * 100));
    }

    function pctBar(pctVal) {
      if (pctVal === null || pctVal === undefined || Number.isNaN(Number(pctVal))) return "—";
      const p = Math.max(0, Math.min(100, Number(pctVal)));
      const tone = p >= 90 ? "danger" : (p >= 70 ? "warn" : "ok");
      const toneClass = tone === "danger" ? "danger" : (tone === "warn" ? "warn" : "");
      return `
        <div class="rz-progress-block">
          <div class="rz-progress-top">
            <span>${esc(networkStatusLabel(p))}</span>
            <span>${esc(Math.round(p))}%</span>
          </div>
          <div class="rz-progress-track">
            <div class="rz-progress-fill ${toneClass}" style="width:${esc(p)}%;"></div>
          </div>
        </div>
      `;
    }

    function toNum(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizePoolLiveStatsPayload(data) {
      const candidates = [
        ...(Array.isArray(data) ? [data] : []),
        ...(Array.isArray(data?.rows) ? [data.rows] : []),
        ...(Array.isArray(data?.data) ? [data.data] : []),
        ...(Array.isArray(data?.items) ? [data.items] : []),
        ...(Array.isArray(data?.stats) ? [data.stats] : []),
        ...(Array.isArray(data?.pool_live_stats) ? [data.pool_live_stats] : []),
        ...(Array.isArray(data?.pools) ? [data.pools] : []),
      ];
      for (const arr of candidates) {
        if (arr.length) return arr;
      }
      return [];
    }

    function poolCountLabel(n) {
      const count = Number(n) || 0;
      return `${count} pool${count > 1 ? "s" : ""}`;
    }

    function networkStatusLabel(percentValue) {
      if (percentValue === null || percentValue === undefined || Number.isNaN(Number(percentValue))) {
        return "Statut réseau inconnu";
      }

      const p = Math.max(0, Math.min(100, Number(percentValue)));
      if (p >= 91) return "Réseau saturé";
      if (p >= 76) return "Réseau chargé";
      if (p >= 51) return "Réseau occupé";
      if (p >= 26) return "Réseau stable";
      return "Réseau fluide";
    }

    async function loadDashboardPools() {
      const statusEl = $("status");
      const container = $("poolsContainer");
      const poolFilterEl = $("poolFilter");
      const refreshBtn = $("refresh");

      if (!container) return;

      async function fetchPools() {
        const params = new URLSearchParams();
        params.set("limit", "200");
        params.set("offset", "0");
        const data = await fetchJSON(`/api/admin/pools?${params.toString()}`);
        return data.pools || data.data || data || [];
      }

      async function fetchPoolLiveStatsMap() {
        const data = await fetchJSON("/api/admin/pool-live-stats");
        const rows = normalizePoolLiveStatsPayload(data);
        const map = {};

        for (const row of rows) {
          const pid = String(row?.pool_id || row?.id || "").trim();
          if (!pid) continue;

          const activeClients = toNum(row?.active_clients, 0);
          const capacityMax =
            row?.capacity_max === null || row?.capacity_max === undefined
              ? null
              : toNum(row?.capacity_max, null);

          const percent =
            row?.is_saturated === true && capacityMax && capacityMax > 0
              ? 100
              : pct(activeClients, capacityMax);

          map[pid] = {
            active_clients: activeClients,
            capacity_max: capacityMax,
            is_saturated:
              row?.is_saturated === true ||
              String(row?.is_saturated).toLowerCase() === "true",
            percent,
            raw: row,
          };
        }

        return map;
      }

      function render(pools, liveStatsByPool) {
        const selectedPool = String(poolFilterEl?.value || "").trim().toLowerCase();

        const filteredPools = (pools || []).filter(p => {
          if (!selectedPool) return true;
          const pnameExact = String(p.name || "").toLowerCase();
          return pnameExact === selectedPool;
        });

        if (!filteredPools.length) {
          container.innerHTML = `<div class="rz-empty-card">Aucun pool trouvé.</div>`;
          return;
        }

        container.innerHTML = filteredPools.map(p => {
          const pid = String(p.id || "");
          const name = p.name || pid;

          const stats = liveStatsByPool[pid] || null;
          const live = stats ? toNum(stats.active_clients, 0) : 0;
          const cap =
            stats && stats.capacity_max !== null && stats.capacity_max !== undefined
              ? stats.capacity_max
              : (p.capacity_max === null || p.capacity_max === undefined ? null : Number(p.capacity_max));
          const percent = stats ? stats.percent : pct(live, cap);

          const saturated = stats?.is_saturated || (percent !== null && percent >= 90);
          const displayPercent = percent === null ? null : Math.max(0, Math.min(100, Number(percent)));
          const capacityText = cap === null || cap === undefined ? "—" : cap;
          const usageText = displayPercent === null ? "—" : Math.round(displayPercent);
          const clientWord = live > 1 ? "clients connectés" : "client connecté";

          return `
            <article class="rz-pool-card rz-pool-card-compact ${saturated ? "rz-saturated" : ""}">
              <div class="rz-pool-compact-head">
                <div>
                  <div class="rz-pool-name">${esc(name)}</div>
                  <div class="rz-pool-compact-sub">${esc(live)} ${esc(clientWord)}</div>
                </div>
                <div class="rz-pool-usage-pill">
                  ${esc(live)}/${esc(capacityText)}
                  <span>capacité</span>
                </div>
              </div>

              ${displayPercent === null ? `
                <div class="rz-progress-block">
                  <div class="rz-progress-top"><span>Statut réseau inconnu</span><span>—</span></div>
                  <div class="rz-progress-track"><div class="rz-progress-fill" style="width:0%;"></div></div>
                </div>
              ` : pctBar(displayPercent)}
            </article>
          `;
        }).join("");
      }

      async function load() {
        try {
          if (statusEl) statusEl.textContent = "Chargement des pools…";
          container.innerHTML = `<div class="rz-loading-card">Chargement…</div>`;

          const [pools, liveStatsByPool] = await Promise.all([
            fetchPools(),
            fetchPoolLiveStatsMap(),
          ]);

          if (poolFilterEl) {
            const current = poolFilterEl.value || "";
            const names = (pools || [])
              .map(p => String(p.name || ""))
              .filter(Boolean)
              .sort((a, b) => a.localeCompare(b));

            poolFilterEl.innerHTML =
              `<option value="">Tous les pools</option>` +
              names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("");

            poolFilterEl.value = names.includes(current) ? current : "";
          }

          render(pools, liveStatsByPool);

          if (statusEl) statusEl.textContent = `Chargé : ${poolCountLabel(pools?.length || 0)}.`;
        } catch (e) {
          if (statusEl) statusEl.textContent = "";
          container.innerHTML = `<div class="rz-empty-card" style="color:#d9534f;">Échec du chargement : ${esc(e.message || e)}</div>`;
        }
      }

      refreshBtn?.addEventListener("click", load);
      poolFilterEl?.addEventListener("change", load);

      await load();
    }

    function formatAdminIdentity(admin) {
      const raw = String(admin?.email || admin?.username || "admin").trim();
      const display = raw.includes("@") ? raw.split("@")[0] : raw;
      return `
        <span class="rz-owner-label">Connecté en tant que :</span>
        <span class="rz-owner-name">${esc(display)}</span>
      `;
    }

    async function checkSession() {
      const meEl = document.getElementById("me");
      const statusEl = document.getElementById("status");

      try {
        const admin = await fetchJSON("/api/admin/me");
        if (meEl) meEl.innerHTML = formatAdminIdentity(admin);
        if (statusEl) statusEl.textContent = "Chargement du tableau de bord…";
        await loadDashboardPools();
      } catch (e) {
        window.location.href = "/admin/login.html";
      }
    }

    // NOTE: logout button moved to drawer (nav.js). legacy logout remains hidden.
    checkSession();
  </script>
</body>
</html>
