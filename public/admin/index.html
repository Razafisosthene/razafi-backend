<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAZAFI Admin — Dashboard</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="login-container">
    <div class="card rz-dashboard-shell" style="max-width: 1100px; width: 96%;">

      <!-- TOP BAR -->
      <div class="topbar">
        <div class="title">
          <h1 class="rz-hero-title">RAZAFI Dashboard</h1>
          <div class="rz-hero-subtitle">Vue rapide des pools, clients connectés et capacité réseau.</div>
          <div id="me" class="rz-owner-chip">Checking session...</div>
        </div>

        <!-- legacy nav kept hidden to avoid breaking old JS assumptions -->
        <div class="nav" style="display:none;">
          <a href="/admin/"><button type="button">Dashboard</button></a>
          <a href="/admin/clients.html"><button type="button">Clients</button></a>
          <a href="/admin/aps.html"><button type="button">APs</button></a>
          <a href="/admin/plans.html"><button type="button">Plans</button></a>
          <a href="/admin/pools.html"><button type="button">Pools</button></a>
          <a href="/admin/revenue.html"><button type="button">Revenue</button></a>
                 <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>


      <!-- READ-ONLY POOLS OVERVIEW (Tanaza truth) -->
      <div class="sticky-bar rz-dashboard-tools">
        <div class="filters">
          <input id="q" class="filter-search" placeholder="Search pool / AP..." />
          <select id="poolFilter" class="filter-search" style="max-width:240px;">
            <option value="">All pools</option>
          </select>
          <button type="button" id="refresh" class="filter-btn primary" style="width:auto;">Refresh</button>
        </div>
      </div>

      <div id="poolsContainer" class="rz-pools-grid"></div>
      <div id="status" class="rz-dashboard-status"></div>
    </div>
  </div>

  <!-- NEW shared drawer -->
  <script src="/admin/nav.js"></script>

  <script>
    async function fetchJSON(url, opts = {}) {
      const res = await fetch(url, { credentials: "include", ...opts });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error("Server returned non-JSON"); }
      if (!res.ok) throw new Error(data?.error || data?.message || "Request failed");
      return data;
    }

    // ---------------------------------------------------------------------------
    // READ-ONLY POOLS DASHBOARD
    // Source of truth for pool totals:
    //   /api/admin/pool-live-stats  (MikroTik / RADIUS)
    // AP detail list stays on /api/admin/aps for now.
    // ---------------------------------------------------------------------------

    const $ = (id) => document.getElementById(id);

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    function pct(n, d) {
      const num = Number(n), den = Number(d);
      if (!Number.isFinite(num) || !Number.isFinite(den) || den <= 0) return null;
      return Math.min(999, Math.round((num / den) * 100));
    }

    function pctBar(pctVal) {
      if (pctVal === null || pctVal === undefined || Number.isNaN(Number(pctVal))) return "—";
      const p = Math.max(0, Math.min(100, Number(pctVal)));
      const tone = p >= 90 ? "danger" : (p >= 70 ? "warn" : "ok");
      const toneClass = tone === "danger" ? "danger" : (tone === "warn" ? "warn" : "");
      return `
        <div class="rz-progress-block">
          <div class="rz-progress-top">
            <span>Utilisation</span>
            <span>${esc(Math.round(p))}%</span>
          </div>
          <div class="rz-progress-track">
            <div class="rz-progress-fill ${toneClass}" style="width:${esc(p)}%;"></div>
          </div>
        </div>
      `;
    }

    function isOnline(a) {
      return (a.tanaza_online === true) || (String(a.tanaza_online).toLowerCase() === "true");
    }

    function apStatusClass(a) {
      const v = a.tanaza_online;
      if (v === true || String(v).toLowerCase() === "true") return "online";
      if (v === false || String(v).toLowerCase() === "false") return "offline";
      return "unknown";
    }

    function apConnected(a) {
      const raw = (a.tanaza_connected ?? a.tanaza_connected_clients ?? a.tanaza_connectedClients ?? a.connectedClients ?? 0);
      const n = Number.isFinite(Number(raw)) ? Number(raw) : 0;
      return n;
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function toNum(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizePoolLiveStatsPayload(data) {
      const candidates = [
        ...(Array.isArray(data) ? [data] : []),
        ...(Array.isArray(data?.rows) ? [data.rows] : []),
        ...(Array.isArray(data?.data) ? [data.data] : []),
        ...(Array.isArray(data?.items) ? [data.items] : []),
        ...(Array.isArray(data?.stats) ? [data.stats] : []),
        ...(Array.isArray(data?.pool_live_stats) ? [data.pool_live_stats] : []),
        ...(Array.isArray(data?.pools) ? [data.pools] : []),
      ];
      for (const arr of candidates) {
        if (arr.length) return arr;
      }
      return [];
    }

    async function loadDashboardPools() {
      const statusEl = $("status");
      const container = $("poolsContainer");
      const qEl = $("q");
      const poolFilterEl = $("poolFilter");
      const refreshBtn = $("refresh");

      if (!container) return;

      async function fetchAllAps() {
        try {
          const data = await fetchJSON("/api/admin/aps?limit=200&offset=0&active=all&stale=all");
          return data.aps || [];
        } catch {
          return [];
        }
      }

      async function fetchPools() {
        const params = new URLSearchParams();
        params.set("limit", "200");
        params.set("offset", "0");
        const data = await fetchJSON(`/api/admin/pools?${params.toString()}`);
        return data.pools || data.data || data || [];
      }

      async function fetchPoolLiveStatsMap() {
        const data = await fetchJSON("/api/admin/pool-live-stats");
        const rows = normalizePoolLiveStatsPayload(data);
        const map = {};

        for (const row of rows) {
          const pid = String(row?.pool_id || row?.id || "").trim();
          if (!pid) continue;

          const activeClients = toNum(row?.active_clients, 0);
          const capacityMax =
            row?.capacity_max === null || row?.capacity_max === undefined
              ? null
              : toNum(row?.capacity_max, null);

          const percent =
            row?.is_saturated === true && capacityMax && capacityMax > 0
              ? 100
              : pct(activeClients, capacityMax);

          map[pid] = {
            active_clients: activeClients,
            capacity_max: capacityMax,
            is_saturated:
              row?.is_saturated === true ||
              String(row?.is_saturated).toLowerCase() === "true",
            percent,
            raw: row,
          };
        }

        return map;
      }

      function render(pools, allAps, liveStatsByPool) {
        const q = String(qEl?.value || "").trim().toLowerCase();
        const selectedPool = String(poolFilterEl?.value || "").trim().toLowerCase();

        const apsByPool = {};
        for (const a of allAps || []) {
          const pid = a.pool_id || "";
          if (!pid) continue;
          (apsByPool[pid] ||= []).push(a);
        }

        const filteredPools = (pools || []).filter(p => {
          if (selectedPool) {
            const pnameExact = String(p.name || "").toLowerCase();
            if (pnameExact !== selectedPool) return false;
          }
          if (!q) return true;
          const pname = String(p.name || p.id || "").toLowerCase();
          if (pname.includes(q)) return true;
          const pid = String(p.id || "");
          const aps = apsByPool[pid] || [];
          return aps.some(a => {
            const label = String(a.tanaza_label || a.ap_mac || "").toLowerCase();
            const mac = String(a.ap_mac || "").toLowerCase();
            return label.includes(q) || mac.includes(q);
          });
        });

        if (!filteredPools.length) {
          container.innerHTML = `<div class="rz-empty-card">No pools found.</div>`;
          return;
        }

        container.innerHTML = filteredPools.map(p => {
          const pid = String(p.id || "");
          const name = p.name || pid;

          const stats = liveStatsByPool[pid] || null;
          const live = stats ? toNum(stats.active_clients, 0) : 0;
          const cap =
            stats && stats.capacity_max !== null && stats.capacity_max !== undefined
              ? stats.capacity_max
              : (p.capacity_max === null || p.capacity_max === undefined ? null : Number(p.capacity_max));
          const percent = stats ? stats.percent : pct(live, cap);

          const aps = (apsByPool[pid] || []).slice().sort((a,b) => {
            const ao = isOnline(a) ? 1 : 0;
            const bo = isOnline(b) ? 1 : 0;
            if (ao !== bo) return bo - ao;
            return (apConnected(b) - apConnected(a));
          });

          const apListHtml = aps.length
            ? `
              <div class="rz-ap-section">
                <div class="rz-ap-title">
                  <span>APs</span>
                  <span>${esc(aps.length)} total</span>
                </div>
                <div class="rz-ap-list">
                  ${aps.map(a => {
                    const mac = String(a.ap_mac || "");
                    const label = a.tanaza_label || mac || "—";
                    const online = isOnline(a);
                    const connected = apConnected(a);
                    return `
                      <div class="rz-ap-row ${online ? "" : "is-offline"}">
                        <div class="rz-ap-main">
                          <div class="rz-ap-name">${esc(label)}</div>
                          <div class="rz-ap-mac">${esc(mac)}</div>
                        </div>
                        <div class="rz-ap-side">
                          <span class="ap-dot ${apStatusClass(a)}"></span>
                          <span>${esc(connected)}</span>
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>
            `
            : `<div class="rz-ap-section"><div class="rz-empty-card">No APs assigned to this pool.</div></div>`;

          const saturated = stats?.is_saturated || (percent !== null && percent >= 90);
          const displayPercent = percent === null ? null : Math.max(0, Math.min(100, Number(percent)));
          return `
            <article class="rz-pool-card ${saturated ? "rz-saturated" : ""}">
              <div class="rz-pool-head">
                <div>
                  <div class="rz-pool-name">${esc(name)}</div>
                  <div class="rz-pool-id" title="${esc(pid)}">ID: ${esc(pid)}</div>
                </div>
                <div class="rz-pool-badge">${esc(live)}</div>
              </div>

              <div class="rz-pool-metrics">
                <div class="rz-metric">
                  <div class="rz-metric-label">Live clients</div>
                  <div class="rz-metric-value">${esc(live)}</div>
                </div>
                <div class="rz-metric">
                  <div class="rz-metric-label">Capacity</div>
                  <div class="rz-metric-value">${esc(cap ?? "—")}</div>
                </div>
              </div>

              ${displayPercent === null ? `
                <div class="rz-progress-block">
                  <div class="rz-progress-top"><span>Utilisation</span><span>—</span></div>
                  <div class="rz-progress-track"><div class="rz-progress-fill" style="width:0%;"></div></div>
                </div>
              ` : pctBar(displayPercent)}

              ${apListHtml}
            </article>
          `;
        }).join("");
      }

      async function load() {
        try {
          if (statusEl) statusEl.textContent = "Loading pools…";
          container.innerHTML = `<div class="rz-loading-card">Loading…</div>`;

          const [allAps, pools, liveStatsByPool] = await Promise.all([
            fetchAllAps(),
            fetchPools(),
            fetchPoolLiveStatsMap(),
          ]);

          if (poolFilterEl) {
            const current = poolFilterEl.value || "";
            const names = (pools || [])
              .map(p => String(p.name || ""))
              .filter(Boolean)
              .sort((a, b) => a.localeCompare(b));

            poolFilterEl.innerHTML =
              `<option value="">All pools</option>` +
              names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("");

            poolFilterEl.value = names.includes(current) ? current : "";
          }

          render(pools, allAps, liveStatsByPool);

          if (statusEl) statusEl.textContent = `Loaded ${pools?.length || 0} pool(s).`;
        } catch (e) {
          if (statusEl) statusEl.textContent = "";
          container.innerHTML = `<div class="rz-empty-card" style="color:#d9534f;">Failed to load: ${esc(e.message || e)}</div>`;
        }
      }

      refreshBtn?.addEventListener("click", load);
      poolFilterEl?.addEventListener("change", load);
      qEl?.addEventListener("input", async () => { await load(); });

      await load();
    }

    async function checkSession() {
      const meEl = document.getElementById("me");
      const statusEl = document.getElementById("status");

      try {
        const admin = await fetchJSON("/api/admin/me");
        if (meEl) meEl.textContent = "Connected as " + (admin.email || admin.username || "admin");
        if (statusEl) statusEl.textContent = "Loading dashboard…";
        await loadDashboardPools();
      } catch (e) {
        window.location.href = "/admin/login.html";
      }
    }

    // NOTE: logout button moved to drawer (nav.js). legacy logout remains hidden.
    checkSession();
  </script>
</body>
</html>
