<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAZAFI Admin — Pools</title>
  <link rel="stylesheet" href="/admin/admin.css" />

  <!-- Pools page local polish only: no global admin.css change -->
  <style>
    .rz-pools-shell{display:flex;flex-direction:column;gap:14px;}
    .rz-pools-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;}
    .rz-pools-title-block{min-width:0;}
    .rz-pools-me{white-space:normal;line-height:1.25;}
    .rz-pools-me strong{display:block;color:var(--rz-text,#111827);font-weight:900;margin-top:2px;word-break:break-word;}

    .rz-pools-filter-card{
      position:sticky;
      top:10px;
      z-index:8;
      padding:12px;
      border-radius:26px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(255,255,255,.92);
      box-shadow:0 16px 36px rgba(15,23,42,.08);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }
    .rz-pools-filter-grid{display:grid;grid-template-columns:minmax(220px,1fr) auto;gap:10px;align-items:center;}
    .rz-pools-filter-grid select{margin-bottom:0;}
    .rz-pools-filter-grid button{width:auto;margin-bottom:0;}

    .rz-pools-list{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:2px;
    }
    .rz-pool-card{
      width:100%;
      text-align:left;
      border:1px solid rgba(255,255,255,.92);
      background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.76));
      border-radius:30px;
      padding:18px;
      box-shadow:0 18px 38px rgba(15,23,42,.09);
      cursor:pointer;
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      color:var(--rz-text,#111827);
    }
    .rz-pool-card:hover{transform:translateY(-2px);box-shadow:0 22px 46px rgba(15,23,42,.12);border-color:rgba(13,110,253,.18);}
    .rz-pool-card:active{transform:scale(.992);}
    .rz-pool-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
    .rz-pool-name{font-size:18px;font-weight:950;letter-spacing:-.025em;line-height:1.18;word-break:break-word;}
    .rz-pool-chevron{flex:0 0 auto;width:30px;height:30px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:rgba(17,24,39,.06);font-weight:950;color:rgba(17,24,39,.55);}
    .rz-pool-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
    .rz-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      max-width:100%;
      padding:8px 11px;
      border-radius:999px;
      background:rgba(17,24,39,.055);
      color:rgba(17,24,39,.74);
      font-size:13px;
      font-weight:850;
      line-height:1.15;
    }
    .rz-pill strong{font-weight:950;color:rgba(17,24,39,.92);}
    .rz-pill-ok{background:rgba(25,135,84,.11);color:#137a3a;}
    .rz-pill-muted{background:rgba(107,114,128,.10);color:#5f6672;}
    .rz-pill-warn{background:rgba(255,193,7,.16);color:#8a5f00;}
    .rz-pools-empty{
      padding:18px;
      border-radius:26px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(255,255,255,.92);
      color:var(--rz-muted,#6b7280);
      font-weight:850;
      box-shadow:0 14px 30px rgba(15,23,42,.07);
    }

    .rz-pools-create-card{
      display:none;
      margin-top:8px;
      padding:16px;
      border-radius:28px;
      background:rgba(255,255,255,.76);
      border:1px solid rgba(255,255,255,.88);
      box-shadow:0 12px 28px rgba(15,23,42,.08);
    }
    .rz-pools-create-card.is-visible{display:block;}
    .rz-pools-create-simple{display:none;margin-top:8px;padding:16px;border-radius:28px;background:rgba(255,255,255,.76);border:1px solid rgba(255,255,255,.88);box-shadow:0 12px 28px rgba(15,23,42,.08);}
    .rz-pools-create-simple.is-visible{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .rz-pools-create-simple button{width:auto;margin:0;}
    .rz-pools-create-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
    .rz-pools-create-title{font-weight:950;font-size:18px;letter-spacing:-.02em;color:var(--rz-text,#111827);}
    .rz-pools-create-subtitle{font-size:13px;color:var(--rz-muted,#6b7280);font-weight:750;margin-top:4px;}
    .rz-pools-form-grid{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr)) auto;gap:10px;align-items:center;}
    .rz-pools-form-grid input,.rz-pools-form-grid select{margin-bottom:0;}
    .rz-pools-form-grid button{width:auto;}
    .rz-hidden-system-toggle{display:none!important;}

    .rz-pool-modal-backdrop{
      position:fixed;
      inset:0;
      z-index:1000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(15,23,42,.42);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .rz-pool-modal-backdrop.is-open{display:flex;}
    .rz-pool-modal{
      position:relative;
      width:min(980px,100%);
      max-height:min(90vh,940px);
      overflow:hidden;
      border-radius:34px;
      background:rgba(255,255,255,.94);
      border:1px solid rgba(255,255,255,.96);
      box-shadow:0 30px 90px rgba(15,23,42,.30);
      display:flex;
      flex-direction:column;
      animation:rzModalPop .18s ease-out;
      min-height:0;
    }
    @keyframes rzModalPop{
      from{opacity:0;transform:translateY(10px) scale(.985);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }
    .rz-pool-modal-head{
      padding:18px 18px 14px;
      border-bottom:1px solid rgba(17,24,39,.08);
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .rz-modal-title{font-size:20px;font-weight:950;letter-spacing:-.03em;line-height:1.15;color:var(--rz-text,#111827);word-break:break-word;}
    .rz-modal-sub{margin-top:7px;display:flex;gap:8px;flex-wrap:wrap;}
    .rz-modal-close{
      flex:0 0 auto;
      width:40px;
      height:40px;
      border-radius:999px;
      border:0;
      background:rgba(17,24,39,.07);
      color:rgba(17,24,39,.78);
      font-size:22px;
      line-height:1;
      font-weight:900;
      cursor:pointer;
    }
    .rz-modal-body{
      flex:1 1 auto;
      min-height:0;
      padding:16px 18px 128px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }
    .rz-modal-section{
      padding:14px;
      border-radius:26px;
      background:rgba(248,250,252,.80);
      border:1px solid rgba(17,24,39,.06);
      margin-bottom:12px;
    }
    .rz-modal-section-title{
      font-size:14px;
      font-weight:950;
      color:rgba(17,24,39,.88);
      margin-bottom:12px;
      letter-spacing:-.01em;
    }
    .rz-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .rz-field{display:flex;flex-direction:column;gap:6px;}
    .rz-field label{font-size:12px;font-weight:900;color:var(--rz-muted,#6b7280);}
    .rz-field input,.rz-field select,.rz-field textarea{
      width:100%;
      margin:0!important;
      border-radius:16px!important;
      min-height:44px;
    }
    .rz-field textarea{min-height:112px;resize:vertical;padding:12px;}
    .rz-readonly-box{
      min-height:44px;
      display:flex;
      align-items:center;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(17,24,39,.055);
      color:rgba(17,24,39,.84);
      font-weight:850;
      word-break:break-word;
    }
    .rz-ann-preview{
      margin-top:10px;
      padding:12px 13px;
      border-radius:20px;
      background:linear-gradient(180deg,rgba(13,110,253,.10),rgba(13,110,253,.055));
      border:1px solid rgba(13,110,253,.14);
      color:#0f315f;
      font-size:13px;
      font-weight:750;
      line-height:1.35;
      white-space:pre-wrap;
    }
    .rz-ann-preview.is-empty{color:#6b7280;background:rgba(17,24,39,.045);border-color:rgba(17,24,39,.06);}
    .rz-tech-toggle{
      width:100%;
      border:0;
      border-radius:18px;
      padding:12px 14px;
      background:rgba(17,24,39,.07);
      color:rgba(17,24,39,.78);
      font-weight:950;
      text-align:left;
      cursor:pointer;
      margin-bottom:10px;
    }
    .rz-tech-panel{display:none;}
    .rz-tech-panel.is-open{display:block;}
    .rz-ap-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;max-width:100%;padding-bottom:8px;}
    .rz-ap-table{width:100%;border-collapse:collapse;min-width:820px;}
    .rz-ap-table th,.rz-ap-table td{padding:10px;text-align:left;border-top:1px solid rgba(17,24,39,.08);vertical-align:top;font-size:13px;}
    .rz-ap-table th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--rz-muted,#6b7280);}
    .rz-modal-actions{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:12px 18px 16px;
      display:flex;
      gap:10px;
      justify-content:flex-end;
      border-top:1px solid rgba(17,24,39,.08);
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .rz-modal-actions button{width:auto;margin:0;}
    .rz-modal-actions .danger{margin-right:auto;}
    .rz-pool-success-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin-left:8px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(25,135,84,.12);
      color:#137a3a;
      border:1px solid rgba(25,135,84,.28);
      font-size:12px;
      font-weight:950;
      white-space:nowrap;
      animation:rzPoolSuccessPop .18s ease-out;
    }
    .rz-pool-flash-success{
      animation:rzPoolFlashSuccess 1.35s ease-out;
      outline:2px solid rgba(25,135,84,.45)!important;
      outline-offset:2px;
    }
    @keyframes rzPoolSuccessPop{
      from{transform:scale(.92);opacity:0;}
      to{transform:scale(1);opacity:1;}
    }
    @keyframes rzPoolFlashSuccess{
      0%{background-color:rgba(25,135,84,.22);box-shadow:0 0 0 0 rgba(25,135,84,.36);}
      35%{background-color:rgba(25,135,84,.14);box-shadow:0 0 0 8px rgba(25,135,84,.08);}
      100%{background-color:transparent;box-shadow:none;}
    }

    @media (max-width:980px){
      .rz-pools-list{grid-template-columns:1fr;}
      .rz-pools-form-grid{grid-template-columns:1fr 1fr;}
      .rz-pools-form-grid button{width:100%;}
    }
    @media (max-width:640px){
      .rz-pools-shell{gap:12px;}
      .rz-pools-header{gap:8px;}
      .rz-pools-filter-grid{grid-template-columns:1fr;}
      .rz-pools-filter-grid button{width:100%;}
      .rz-pool-card{border-radius:28px;padding:16px;}
      .rz-pool-name{font-size:17px;}
      .rz-pools-form-grid{grid-template-columns:1fr;}
      .rz-pools-create-card{border-radius:26px;padding:14px;}
      .rz-pool-modal-backdrop{padding:10px;align-items:flex-end;}
      .rz-pool-modal{border-radius:32px 32px 0 0;max-height:92vh;}
      .rz-form-grid{grid-template-columns:1fr;}
      .rz-modal-body{padding:14px 14px 118px;}
      .rz-modal-actions{padding:10px 14px 14px;flex-direction:column;}
      .rz-modal-actions button{width:100%!important;}
      .rz-modal-actions .danger{margin-right:0;order:3;}
    }
  </style>
</head>
<body class="rz-admin-shell pools-page">
  <div class="login-container">
    <div class="card rz-pools-shell" style="width:100%; max-width:1050px;">
      <div class="topbar rz-pools-header">
        <div class="title rz-pools-title-block">
          <h1 class="rz-hero-title">Pools</h1>
          <div id="me" class="subtitle rz-pools-me">Vérification de la session…</div>
        </div>

        <!-- Navigation legacy gardée cachée pour compatibilité JS / rollback rapide -->
        <div class="nav" style="display:none;">
          <a href="/admin/"><button type="button">Dashboard</button></a>
          <a href="/admin/clients.html"><button type="button">Clients</button></a>
          <a href="/admin/aps.html"><button type="button">APs</button></a>
          <a href="/admin/plans.html"><button type="button">Plans</button></a>
          <a href="/admin/revenue.html"><button type="button">Revenue</button></a>
          <button id="logoutBtn" type="button">Déconnexion</button>
        </div>
      </div>

      <div id="msg" class="error" style="display:none;"></div>

      <!-- Filters directly after connected user -->
      <div class="rz-pools-filter-card">
        <div class="filters rz-pools-filter-grid">
          <div class="rz-hidden-system-toggle" aria-hidden="true">
            <button type="button" id="sysPortalBtn" class="filter-btn">Portal</button>
            <button type="button" id="sysMikrotikBtn" class="filter-btn primary">MikroTik</button>
          </div>
          <select id="poolSelectFilter" class="filter-select" aria-label="Choisir un pool">
            <option value="all">Tous les pools</option>
          </select>
          <button type="button" id="refresh" class="filter-btn primary">Actualiser</button>
        </div>
      </div>

      <!-- Clean card list -->
      <div id="rows" class="rz-pools-list">
        <div class="rz-pools-empty">Chargement…</div>
      </div>

      <!-- Create pool: bottom + superadmin only -->
      <div id="createPoolSection" class="rz-pools-create-simple">
        <div>
          <div class="rz-pools-create-title">Nouveau pool</div>
          <div class="rz-pools-create-subtitle">Section superadmin uniquement.</div>
        </div>
        <button type="button" id="openCreatePoolModalBtn" class="filter-btn primary">Créer</button>
      </div>
    </div>
  </div>

  <!-- Pool modal -->
  <div id="poolModalBackdrop" class="rz-pool-modal-backdrop" aria-hidden="true">
    <div class="rz-pool-modal" role="dialog" aria-modal="true" aria-labelledby="poolModalTitle">
      <div class="rz-pool-modal-head">
        <div>
          <div id="poolModalTitle" class="rz-modal-title">Pool</div>
          <div id="poolModalSub" class="rz-modal-sub"></div>
        </div>
        <button id="poolModalClose" type="button" class="rz-modal-close" aria-label="Fermer">×</button>
      </div>
      <div id="poolModalBody" class="rz-modal-body"></div>
      <div id="poolModalActions" class="rz-modal-actions"></div>
    </div>
  </div>

  <!-- Create pool modal: superadmin only -->
  <div id="createPoolModalBackdrop" class="rz-pool-modal-backdrop" aria-hidden="true">
    <div class="rz-pool-modal" role="dialog" aria-modal="true" aria-labelledby="createPoolModalTitle">
      <div class="rz-pool-modal-head">
        <div>
          <div id="createPoolModalTitle" class="rz-modal-title">Nouveau pool</div>
          <div class="rz-modal-sub">
            <span class="rz-pill">Superadmin uniquement</span>
          </div>
        </div>
        <button id="createPoolModalClose" type="button" class="rz-modal-close" aria-label="Fermer">×</button>
      </div>

      <div class="rz-modal-body">
        <div class="rz-modal-section">
          <div class="rz-modal-section-title">Informations du nouveau pool</div>
          <div class="rz-form-grid">
            <select id="newSystem" class="rz-hidden-system-toggle" aria-hidden="true">
              <option value="portal">Portal</option>
              <option value="mikrotik">MikroTik</option>
            </select>

            <div class="rz-field">
              <label>Nom du pool</label>
              <input id="newName" placeholder="Nom du pool" />
            </div>

            <div class="rz-field">
              <label>Téléphone contact</label>
              <input id="newContactPhone" placeholder="Téléphone contact" />
            </div>

            <div class="rz-field">
              <label>Capacité max</label>
              <input id="newCap" type="number" min="0" placeholder="Capacité max" />
            </div>

            <div class="rz-field">
              <label>IP MikroTik</label>
              <input id="newMikrotikIp" placeholder="IP MikroTik" />
            </div>

            <div class="rz-field">
              <label>NAS ID</label>
              <input id="newRadiusNasId" placeholder="NAS ID" />
            </div>
          </div>
        </div>
      </div>

      <div class="rz-modal-actions">
        <button type="button" id="createPoolModalCancel">Fermer</button>
        <button type="button" id="createPoolBtn" class="filter-btn primary">Créer</button>
      </div>
    </div>
  </div>

  <!-- NEW shared drawer -->
  <script src="/admin/nav.js"></script>
  <script src="/admin/pools.js"></script>
</body>
</html>
