<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>RAZAFI Admin — Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="rz-login-page">

  <div class="login-container rz-login-container">
    <div class="card rz-login-card">
      <h1 class="rz-login-title">Connexion à RAZAFI</h1>
      <p class="subtitle rz-login-subtitle">Accès sécurisé à votre espace administrateur</p>

      <div class="rz-login-google-section">
        <div id="googleSignInButton" class="rz-login-google-button"></div>
      </div>

      <div class="rz-login-divider" aria-hidden="true">
        <span></span>
        <strong>ou</strong>
        <span></span>
      </div>

      <form id="loginForm" class="rz-login-form">
        <input
          type="email"
          id="email"
          placeholder="Email administrateur"
          required
          autocomplete="username"
        />

        <input
          type="password"
          id="password"
          placeholder="Mot de passe"
          required
          autocomplete="current-password"
        />

        <button type="submit" class="rz-login-submit">Se connecter</button>
      </form>

      <div id="error" class="error rz-login-error"></div>

<div class="rz-login-owner-cta">
  <a
    href="https://razafistore.com/"
    target="_blank"
    rel="noopener noreferrer"
    class="rz-login-platform-btn"
    style="display:flex; align-items:center; justify-content:center; width:100%; margin-top:2px; padding:14px 18px; border-radius:999px; background:rgba(255,255,255,.86); color:#111827; border:1px solid rgba(17,24,39,.10); box-shadow:0 18px 44px rgba(15,23,42,.10); font-weight:900; text-decoration:none; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); transition:transform .22s ease, box-shadow .22s ease, background .22s ease;"
  >
    Découvrir la plateforme RAZAFI
  </a>
</div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="./login.js"></script>
</body>
</html>
