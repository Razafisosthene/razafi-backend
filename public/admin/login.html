<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>RAZAFI Admin — Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="rz-login-page">

  <div class="login-container rz-login-container">
    <div class="card rz-login-card">
      <h1 class="rz-login-title">Connexion à RAZAFI</h1>
      <p class="subtitle rz-login-subtitle">Accès sécurisé à votre espace administrateur</p>

      <div class="rz-login-google-section">
        <div id="googleSignInButton" class="rz-login-google-button"></div>
      </div>

      <div class="rz-login-divider" aria-hidden="true">
        <span></span>
        <strong>ou</strong>
        <span></span>
      </div>

      <form id="loginForm" class="rz-login-form">
        <input
          type="email"
          id="email"
          placeholder="Email administrateur"
          required
          autocomplete="username"
        />

        <input
          type="password"
          id="password"
          placeholder="Mot de passe"
          required
          autocomplete="current-password"
        />

        <button type="submit" class="rz-login-submit">Se connecter</button>
      </form>

      <div id="error" class="error rz-login-error"></div>

      <div class="rz-login-owner-cta">
        <div>Vous souhaitez vendre du WiFi avec RAZAFI&nbsp;?</div>
        <a href="https://wa.me/261340500592" target="_blank" rel="noopener noreferrer">
          Contacter RAZAFI sur WhatsApp
        </a>
        <span aria-hidden="true">&nbsp;•&nbsp;</span>
        <a href="https://www.razafistore.com" target="_blank" rel="noopener noreferrer">
          Découvrir RAZAFI
        </a>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="./login.js"></script>
</body>
</html>
