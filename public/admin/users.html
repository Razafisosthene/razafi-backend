<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAZAFI Admin — Users</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="login-container">
    <div class="card" style="max-width: 1100px; width: 96%;">
      <div class="topbar">
        <div class="title">
          <h1 style="margin:0;">Users</h1>
          <div id="me" class="subtitle">Checking session...</div>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="newBtn" type="button">New User</button>
          <button id="logoutBtn" class="danger" type="button">Logout</button>
        </div>
      </div>

      <div id="err" class="error" style="display:none; margin-top:10px;"></div>

      <div class="table-wrap">
        <table style="width:100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th style="text-align:left; padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Email</th>
              <th style="text-align:left; padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Role</th>
              <th style="text-align:left; padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Status</th>
              <th style="text-align:left; padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Pools</th>
              <th style="text-align:right; padding:10px; border-bottom: 1px solid rgba(0,0,0,.12);">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" style="padding:12px; opacity:.75;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal" style="display:none;">
    <div class="modal-card">

      <div class="topbar">
        <div>
          <h1 id="modalTitle" style="margin:0; text-align:left;">New User</h1>
          <div id="modalSub" class="subtitle" style="text-align:left; margin:6px 0 0 0;">Pool read-only user</div>
        </div>
        <button id="closeModalBtn" type="button" style="width:auto;">Close</button>
      </div>

      <div id="modalErr" class="error" style="display:none;"></div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:12px;">
        <div>
          <label style="display:block; font-weight:700; margin-bottom:6px;">Email</label>
          <input id="emailInput" type="email" placeholder="user@example.com" />
        </div>

        <div>
          <label style="display:block; font-weight:700; margin-bottom:6px;">Password</label>
          <input id="passwordInput" type="password" placeholder="min 6 chars (leave empty to keep)" />
        </div>

        <div style="grid-column: 1 / span 2;">
          <label style="display:block; font-weight:700; margin-bottom:6px;">Assigned Pools (multi)</label>
          <select id="poolsSelect" multiple size="8" style="width:100%; padding:10px;"></select>
          <div class="subtitle" style="text-align:left; margin-top:6px; margin-bottom:0;">
            User can ONLY see Dashboard + Clients + Revenue + Plans for these pools.
          </div>
        </div>

        <div>
          <label style="display:flex; align-items:center; gap:10px; font-weight:700;">
            <input id="activeToggle" type="checkbox" checked />
            Active
          </label>
        </div>
      </div>

      <!-- IMPORTANT: keep these IDs because users.js binds them -->
      <div class="modal-actions users-modal-actions">
        <button id="deleteBtn" class="danger" type="button">Delete</button>

        <div class="users-modal-right-actions">
          <button id="saveBtn" type="button">Save</button>
          <button id="closeModalBtn2" type="button">Close</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/admin/nav.js"></script>
  <script src="./users.js"></script>
</body>
</html>
