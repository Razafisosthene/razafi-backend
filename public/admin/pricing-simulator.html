<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAZAFI Admin — Simulateur de prix</title>
  <link rel="stylesheet" href="/admin/admin.css" />

  <style>
    .rz-simulator-shell{display:flex;flex-direction:column;gap:14px;}
    .rz-simulator-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;}
    .rz-simulator-me{white-space:normal;line-height:1.25;}
    .rz-simulator-me strong{display:block;color:var(--rz-text,#111827);font-weight:900;margin-top:2px;word-break:break-word;}
    .rz-simulator-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.85fr);gap:14px;align-items:start;}
    .rz-simulator-panel,.rz-simulator-result,.rz-simulator-info{border-radius:28px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.9);box-shadow:0 12px 28px rgba(15,23,42,.08);padding:16px;}
    .rz-simulator-panel h2,.rz-simulator-result h2,.rz-simulator-info h2{margin:0 0 10px;color:#0f172a;font-size:20px;letter-spacing:-.04em;}
    .rz-simulator-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .rz-field{display:flex;flex-direction:column;gap:6px;min-width:0;}
    .rz-field.full{grid-column:1/-1;}
    .rz-field label{font-size:12px;font-weight:950;color:#64748b;letter-spacing:-.01em;}
    .rz-field input,.rz-field select{margin:0!important;width:100%;height:48px;border-radius:18px!important;}
    .rz-field-error{min-height:0;color:#b91c1c;font-size:12px;font-weight:900;line-height:1.3;}
    .rz-field-error:empty{display:none;}
    .rz-type-switch{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .rz-type-btn{width:100%;min-height:54px;border-radius:20px!important;background:rgba(248,250,252,.96)!important;color:#0f172a!important;border:1px solid rgba(15,23,42,.08)!important;box-shadow:none!important;font-weight:950!important;}
    .rz-type-btn.active{background:linear-gradient(180deg,#2382ff 0%,#0d6efd 100%)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 12px 24px rgba(13,110,253,.18)!important;}
    .rz-simulate-btn{grid-column:1/-1;min-height:52px;border-radius:20px!important;font-weight:950!important;}
    .rz-small-note{grid-column:1/-1;margin-top:-4px;color:#64748b;font-size:12px;font-weight:750;line-height:1.35;}
    .rz-result-empty{color:#64748b;font-size:14px;font-weight:800;line-height:1.45;}
    .rz-result-status{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:950;border:1px solid rgba(15,23,42,.08);background:rgba(248,250,252,.9);color:#334155;margin-bottom:12px;}
    .rz-result-status.ok{background:rgba(22,163,74,.12);color:#15803d;border-color:rgba(22,163,74,.22);}
    .rz-result-status.warning{background:rgba(245,158,11,.14);color:#92400e;border-color:rgba(245,158,11,.25);}
    .rz-result-status.blocked{background:rgba(239,68,68,.12);color:#b91c1c;border-color:rgba(239,68,68,.25);}
    .rz-price-big{font-size:42px;line-height:.98;font-weight:950;letter-spacing:-.06em;color:#0d6efd;margin:10px 0 6px;}
    .rz-plan-name-card{padding:12px;border-radius:20px;background:rgba(248,250,252,.82);border:1px solid rgba(15,23,42,.07);margin-top:10px;}
    .rz-k{font-size:11px;color:#64748b;font-weight:950;text-transform:uppercase;letter-spacing:.04em;}
    .rz-v{margin-top:4px;color:#0f172a;font-size:15px;font-weight:950;word-break:break-word;}
    .rz-range{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
    .rz-message{margin-top:12px;padding:11px 12px;border-radius:18px;background:rgba(248,250,252,.86);border:1px solid rgba(15,23,42,.07);color:#334155;font-size:13px;font-weight:800;line-height:1.35;}
    .rz-message.blocked{background:rgba(254,242,242,.88);border-color:rgba(239,68,68,.20);color:#991b1b;}
    .rz-message.warning{background:rgba(255,251,235,.88);border-color:rgba(245,158,11,.24);color:#92400e;}
    .rz-config-line{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(15,23,42,.07);font-size:13px;}
    .rz-config-line:last-child{border-bottom:0;}
    .rz-config-line span:first-child{color:#64748b;font-weight:850;}
    .rz-config-line span:last-child{color:#0f172a;font-weight:950;text-align:right;}
    .rz-ref-list{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
    .rz-ref-item{display:flex;justify-content:space-between;gap:10px;padding:10px 11px;border-radius:16px;background:rgba(248,250,252,.82);border:1px solid rgba(15,23,42,.07);font-size:13px;}
    .rz-ref-item strong{color:#0f172a;}
    .rz-ref-item span{color:#0d6efd;font-weight:950;white-space:nowrap;}
    .error{text-align:left;}

    .rz-admin-config{margin-top:0;}
    .rz-admin-config[hidden]{display:none!important;}
    .rz-config-edit-grid{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:10px;margin-top:12px;}
    .rz-config-edit-grid .rz-field input{height:46px;}
    .rz-config-editor-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;}
    .rz-config-editor-head p{margin:4px 0 0;color:#64748b;font-size:13px;font-weight:750;line-height:1.35;}
    .rz-config-save-row{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
    .rz-config-save-row button{width:auto;min-height:46px;padding:0 16px;border-radius:18px!important;}
    .rz-editor-status{color:#64748b;font-size:13px;font-weight:850;}
    .rz-ref-editor-list{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
    .rz-ref-editor-item{display:grid;grid-template-columns:minmax(180px,1.2fr) minmax(110px,.55fr) minmax(90px,.45fr) minmax(90px,.45fr);gap:10px;align-items:end;padding:12px;border-radius:20px;background:rgba(248,250,252,.82);border:1px solid rgba(15,23,42,.07);}
    .rz-ref-editor-title{font-weight:950;color:#0f172a;line-height:1.15;}
    .rz-ref-editor-sub{margin-top:4px;color:#64748b;font-size:12px;font-weight:800;}
    .rz-ref-editor-item input{height:44px!important;border-radius:16px!important;margin:0!important;}
    .rz-ref-editor-check{display:flex;align-items:center;gap:8px;height:44px;padding:0 10px;border-radius:16px;background:rgba(255,255,255,.75);border:1px solid rgba(15,23,42,.07);font-size:13px;font-weight:900;color:#334155;}
    .rz-ref-editor-check input{width:18px!important;height:18px!important;margin:0!important;accent-color:#0d6efd;}

    .rz-create-card{margin-top:18px;padding:15px;border-radius:24px;background:linear-gradient(180deg,rgba(239,246,255,.96),rgba(255,255,255,.94));border:1px solid rgba(13,110,253,.22);box-shadow:0 14px 30px rgba(13,110,253,.10);} 
    .rz-create-title{display:flex;align-items:center;gap:8px;color:#0f172a;font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.04em;}
    .rz-create-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
    .rz-create-grid .full{grid-column:1/-1;}
    .rz-create-note{margin-top:10px;color:#64748b;font-size:12px;font-weight:750;line-height:1.35;}
    .rz-create-error{display:none;margin-top:10px;padding:10px 11px;border-radius:16px;background:rgba(254,242,242,.92);border:1px solid rgba(239,68,68,.22);color:#991b1b;font-size:13px;font-weight:900;line-height:1.35;}
    .rz-create-error:not(:empty){display:block;}
    .rz-create-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
    .rz-create-actions button{width:100%;min-height:48px;border-radius:18px!important;}
    .rz-create-success{margin-top:12px;padding:12px;border-radius:18px;background:rgba(22,163,74,.10);border:1px solid rgba(22,163,74,.22);color:#15803d;font-size:13px;font-weight:850;line-height:1.35;}

    .rz-collapse-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;list-style:none;cursor:default;}
    .rz-collapse-summary::-webkit-details-marker{display:none;}
    .rz-collapse-summary h2{margin:0!important;}
    .rz-collapse-icon{display:none;color:#64748b;font-size:15px;font-weight:950;transition:transform .18s ease;}
    .rz-mobile-collapsible:not([open]) .rz-collapse-icon{transform:rotate(-90deg);}
    .rz-collapse-body{margin-top:10px;}

    @media (max-width:520px){
      .login-container{padding-top:6px!important;}
      .card.rz-simulator-shell{gap:7px!important;width:98%!important;}
      .rz-simulator-header{gap:4px!important;margin-bottom:0!important;padding-bottom:0!important;}
      .rz-simulator-header .title{margin-bottom:0!important;}
      .rz-hero-title{margin-bottom:1px!important;}
      .rz-hero-subtitle{margin-top:1px!important;margin-bottom:0!important;line-height:1.18!important;}
      .rz-simulator-me{margin-top:3px!important;line-height:1.12!important;}
      .rz-simulator-me strong{margin-top:0!important;}
      #error:empty{display:none!important;}
      .rz-simulator-grid{gap:10px!important;}
      .rz-simulator-panel,.rz-simulator-result,.rz-simulator-info{border-radius:22px;padding:12px;}
      .rz-simulator-panel h2,.rz-simulator-result h2,.rz-simulator-info h2{font-size:18px;margin-bottom:8px;}
      .rz-simulator-form{grid-template-columns:1fr 1fr;gap:9px 10px;}
      .rz-field{gap:4px;}
      .rz-field label{font-size:11px;}
      .rz-field input,.rz-field select{height:42px;border-radius:15px!important;}
      .rz-type-switch{grid-template-columns:1fr 1fr!important;gap:8px;}
      .rz-type-btn{min-height:44px;border-radius:16px!important;font-size:13px!important;padding:0 8px!important;}
      #dataField,.rz-speed-field,.rz-simulate-btn{grid-column:1/-1;}
      .rz-duration-value-field{grid-column:1/2;}
      .rz-duration-unit-field{grid-column:2/3;}
      .rz-speed-field input{height:40px;}
      .rz-simulate-btn{min-height:46px;border-radius:17px!important;}
      .rz-field-error{font-size:11px;line-height:1.2;}
      .rz-mobile-collapsible .rz-collapse-summary{cursor:pointer;}
      .rz-collapse-icon{display:inline-flex;}
      .rz-collapse-body{margin-top:9px;}
      .rz-mobile-collapsible:not([open]){padding-top:11px!important;padding-bottom:11px!important;}
      .rz-mobile-collapsible:not([open]) .rz-collapse-body{display:none!important;}
      .rz-config-edit-grid,.rz-ref-editor-list{margin-top:9px;}
    }
    @media (max-width:520px){.rz-create-grid{grid-template-columns:1fr;}.rz-create-grid .full{grid-column:auto;}.rz-create-actions{grid-template-columns:1fr;}}
    @media (max-width:860px){.rz-config-edit-grid{grid-template-columns:1fr 1fr;}.rz-ref-editor-item{grid-template-columns:1fr 1fr;}.rz-ref-editor-item .rz-ref-editor-titlewrap{grid-column:1/-1;}}
    @media (max-width:520px){.rz-config-edit-grid{grid-template-columns:1fr;}.rz-ref-editor-item{grid-template-columns:1fr;}.rz-config-save-row button{width:100%;}.rz-config-save-row{justify-content:stretch;}}
    @media (max-width:860px){.rz-simulator-grid{grid-template-columns:1fr;}.rz-simulator-form{grid-template-columns:1fr;}.rz-type-switch{grid-template-columns:1fr 1fr;}.rz-range{grid-template-columns:1fr;}}
    @media (max-width:520px){.rz-price-big{font-size:36px;}}
  </style>
</head>
<body class="rz-admin-shell pricing-simulator-page">
  <div class="login-container">
    <div class="card rz-simulator-shell" style="max-width: 1120px; width: 96%;">
      <div class="topbar rz-simulator-header">
        <div class="title">
          <h1 class="rz-hero-title">Simulateur de prix</h1>
          <div class="rz-hero-subtitle">Calculez un prix recommandé avant de créer un forfait.</div>
          <div id="me" class="subtitle rz-simulator-me">Vérification de la session…</div>
        </div>

        <div class="nav" style="display:none;">
          <a href="/admin/"><button type="button">Dashboard</button></a>
          <a href="/admin/plans.html"><button type="button">Plans</button></a>
          <button id="logoutBtn" type="button">Déconnexion</button>
        </div>
      </div>

      <div id="error" class="error"></div>

      <div class="rz-simulator-grid">
        <section class="rz-simulator-panel" aria-labelledby="formTitle">
          <h2 id="formTitle">Détails du forfait</h2>
          <form id="simForm" class="rz-simulator-form">
            <div class="rz-type-switch" role="group" aria-label="Type de forfait">
              <button id="typeDataBtn" class="rz-type-btn" type="button">Data limitée</button>
              <button id="typeUnlimitedBtn" class="rz-type-btn active" type="button">Illimité</button>
            </div>

            <div id="dataField" class="rz-field" style="display:none;">
              <label for="dataGb">Data (Go)</label>
              <input id="dataGb" inputmode="decimal" placeholder="Ex : 20" />
              <div id="dataGbError" class="rz-field-error"></div>
            </div>

            <div class="rz-field rz-duration-value-field">
              <label for="durationValue">Durée</label>
              <input id="durationValue" inputmode="decimal" value="1" placeholder="Ex : 7" required />
              <div id="durationValueError" class="rz-field-error"></div>
            </div>

            <div class="rz-field rz-duration-unit-field">
              <label for="durationUnit">Unité</label>
              <select id="durationUnit">
                <option value="hour">heure(s)</option>
                <option value="day">jour(s)</option>
                <option value="week">semaine(s)</option>
                <option value="month">mois</option>
              </select>
              <div id="durationUnitError" class="rz-field-error"></div>
            </div>

            <div class="rz-field rz-speed-field">
              <label for="speedMbps">Vitesse (Mbps)</label>
              <input id="speedMbps" inputmode="decimal" value="7" placeholder="Ex : 10" required />
              <div id="speedMbpsError" class="rz-field-error"></div>
            </div>

            <button id="simulateBtn" class="filter-btn primary rz-simulate-btn" type="submit">Simuler</button>
          </form>
        </section>

        <section class="rz-simulator-result" aria-labelledby="resultTitle">
          <h2 id="resultTitle">Résultat</h2>
          <div id="resultBox" class="rz-result-empty">Remplissez les champs puis cliquez sur Simuler.</div>
        </section>
      </div>

      <details id="configInfo" class="rz-simulator-info rz-mobile-collapsible" aria-labelledby="configTitle" hidden open>
        <summary class="rz-collapse-summary">
          <h2 id="configTitle">Base dynamique utilisée</h2>
          <span class="rz-collapse-icon" aria-hidden="true">▾</span>
        </summary>
        <div class="rz-collapse-body">
          <div id="configSummary" class="rz-result-empty">Chargement de la configuration…</div>
          <div id="referencesList" class="rz-ref-list"></div>
        </div>
      </details>
      <details id="configEditor" class="rz-simulator-info rz-admin-config rz-mobile-collapsible" aria-labelledby="configEditorTitle" hidden open>
        <summary class="rz-collapse-summary">
          <h2 id="configEditorTitle">⚙️ Configuration simulateur</h2>
          <span class="rz-collapse-icon" aria-hidden="true">▾</span>
        </summary>

        <form id="configForm" class="rz-collapse-body">
          <div class="rz-config-edit-grid">
            <div class="rz-field">
              <label for="cfg_price_tolerance_pct">Tolérance prix (%)</label>
              <input id="cfg_price_tolerance_pct" inputmode="numeric" />
            </div>
            <div class="rz-field">
              <label for="cfg_realistic_usage_factor_pct">Facteur réaliste (%)</label>
              <input id="cfg_realistic_usage_factor_pct" inputmode="numeric" />
            </div>
            <div class="rz-field">
              <label for="cfg_max_data_gb">Max data (Go)</label>
              <input id="cfg_max_data_gb" inputmode="numeric" />
            </div>
            <div class="rz-field">
              <label for="cfg_max_speed_mbps">Max débit (Mbps)</label>
              <input id="cfg_max_speed_mbps" inputmode="numeric" />
            </div>
            <div class="rz-field">
              <label for="cfg_max_duration_days">Max durée (jours)</label>
              <input id="cfg_max_duration_days" inputmode="numeric" />
            </div>
            <div class="rz-field">
              <label for="cfg_max_visible_data_plans">Max plans Data visibles</label>
              <input id="cfg_max_visible_data_plans" inputmode="numeric" />
            </div>
            <div class="rz-field">
              <label for="cfg_max_visible_unlimited_plans">Max plans Illimités visibles</label>
              <input id="cfg_max_visible_unlimited_plans" inputmode="numeric" />
            </div>
          </div>
          <div id="referencesEditor" class="rz-ref-editor-list"></div>

          <div class="rz-config-save-row">
            <span id="configSaveStatus" class="rz-editor-status"></span>
            <button id="reloadConfigBtn" type="button" class="filter-btn">Recharger</button>
            <button id="saveConfigBtn" type="submit" class="filter-btn primary">Enregistrer la configuration</button>
          </div>
        </form>
      </details>

    </div>
  </div>

  <script src="/admin/nav.js"></script>
  <script src="./pricing-simulator.js"></script>
</body>
</html>
